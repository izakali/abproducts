<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AB PRODUCTS — Maintenance</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" href="logo.PNG">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0c1626;--panel:#13223a;--txt:#eef3fa;--muted:rgba(238,243,250,.7);--line:rgba(238,243,250,.13);--brand:#2fbf8b;--gold:#e6b34d}
    *{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(700px 350px at 85% 0,rgba(47,191,139,.12),transparent 65%),radial-gradient(700px 350px at 0 100%,rgba(125,182,224,.1),transparent 65%),var(--bg);color:var(--txt);font-family:Inter,sans-serif}
    .card{width:min(650px,100%);padding:clamp(28px,6vw,54px);border:1px solid var(--line);border-radius:24px;background:var(--panel);box-shadow:0 28px 80px rgba(0,0,0,.45);text-align:center}.logo{width:74px;height:74px;object-fit:contain;margin:0 auto 24px}.eyebrow{color:var(--gold);font-size:.76rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase}.status{display:inline-flex;align-items:center;gap:.55rem;margin-bottom:18px;padding:.55rem .85rem;border:1px solid rgba(230,179,77,.25);border-radius:999px;background:rgba(230,179,77,.08)}.dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}h1{font-family:Archivo,sans-serif;font-size:clamp(2rem,7vw,3.7rem);line-height:1.03;letter-spacing:-.04em;margin:12px 0 18px}p{color:var(--muted);font-size:1.02rem;line-height:1.7}.feature{color:var(--txt);font-weight:800}.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:30px}.btn{min-height:48px;padding:.8rem 1.2rem;border-radius:11px;border:1px solid var(--line);font:700 .95rem Archivo,sans-serif;text-decoration:none;cursor:pointer}.primary{background:var(--brand);color:#04160e;border-color:transparent}.secondary{background:transparent;color:var(--txt)}.note{margin-top:24px;font-size:.8rem;color:rgba(238,243,250,.45)}
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="logo.PNG" alt="AB PRODUCTS">
    <div class="status"><span class="dot"></span><span class="eyebrow">Maintenance temporaire</span></div>
    <h1>Non disponible pour le moment.</h1>
    <p>La fonctionnalité <span class="feature" id="featureName">demandée</span> est temporairement désactivée par l'administrateur. Elle sera de nouveau accessible dès sa réactivation.</p>
    <div class="actions"><a class="btn primary" id="returnLink" href="index.html">Retour au site</a><button class="btn secondary" type="button" onclick="location.reload()">Réessayer</button></div>
    <div class="note">AB PRODUCTS — France → Comores</div>
  </main>
  <script>
    const params=new URLSearchParams(location.search);const feature=params.get('feature');if(feature)document.getElementById('featureName').textContent=feature;
    const back=params.get('return');if(back){try{const target=new URL(back,location.href);if(target.origin===location.origin)document.getElementById('returnLink').href=target.href;}catch(e){}}
  </script>
</body>
</html>
